version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: ycsb-mongodb
    cpus: 2.0
    cpuset: "0-1"
    mem_limit: 2g
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

  cassandra:
    image: cassandra:4.1
    container_name: ycsb-cassandra
    cpus: 2.0
    cpuset: "0-1"
    mem_limit: 2g
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=ycsb-cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  mongodb_data:
  cassandra_data:
