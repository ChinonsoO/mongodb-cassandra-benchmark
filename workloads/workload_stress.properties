# YCSB Stress Test Workload
# Same mix as Workload A (50/50 read/update)
# Used with increasing thread counts to find saturation point

workload=site.ycsb.workloads.CoreWorkload

# Default record/operation counts (overridden at runtime via -p flags)
recordcount=1000000
operationcount=100000

# Field structure (~1KB per record: 10 fields x 100 bytes)
fieldcount=10
fieldlength=100

# Operation mix (same as Workload A)
readproportion=0.5
updateproportion=0.5
scanproportion=0
insertproportion=0
readmodifywriteproportion=0

# Access pattern
requestdistribution=zipfian
readallfields=true
writeallfields=false
insertorder=hashed

# Measurement
measurementtype=hdrhistogram
hdrhistogram.percentiles=95,99
