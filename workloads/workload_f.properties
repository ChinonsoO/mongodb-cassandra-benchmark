# YCSB Workload F - Read-Modify-Write
# 50% reads, 50% read-modify-write
# Simulates apps that read a record, modify it, and write it back

workload=site.ycsb.workloads.CoreWorkload

# Default record/operation counts (overridden at runtime via -p flags)
recordcount=1000000
operationcount=100000

# Field structure (~1KB per record: 10 fields x 100 bytes)
fieldcount=10
fieldlength=100

# Operation mix
readproportion=0.5
updateproportion=0
scanproportion=0
insertproportion=0
readmodifywriteproportion=0.5

# Access pattern
requestdistribution=zipfian
readallfields=true
writeallfields=false
insertorder=hashed

# Measurement
measurementtype=hdrhistogram
hdrhistogram.percentiles=95,99
