# YCSB Bulk Load Workload
# 100% inserts
# Measures write throughput during data loading

workload=site.ycsb.workloads.CoreWorkload

# Default record/operation counts (overridden at runtime via -p flags)
recordcount=1000000
operationcount=100000

# Field structure (~1KB per record: 10 fields x 100 bytes)
fieldcount=10
fieldlength=100

# Operation mix - pure inserts
readproportion=0
updateproportion=0
scanproportion=0
insertproportion=1.0
readmodifywriteproportion=0

# Access pattern
requestdistribution=zipfian
readallfields=true
writeallfields=false
insertorder=hashed

# Measurement
measurementtype=hdrhistogram
hdrhistogram.percentiles=95,99
